name: Docker Build & Deploy Chronoco API

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t priv:chronoco-api .
          docker tag priv:chronoco-api ${{ secrets.DOCKER_USERNAME }}/priv:chronoco-api

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/priv:chronoco-api

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: SSH to host and deploy Chronoco API
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USER }}
          key: ${{ secrets.HOST_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/priv:chronoco-api
            docker stop chronoco-api || true
            docker rm chronoco-api || true
            docker run -d --name chronoco-api -p 3214:3214 ${{ secrets.DOCKER_USERNAME }}/priv:chronoco-api